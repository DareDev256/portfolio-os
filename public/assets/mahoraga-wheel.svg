<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Silver metallic gradient -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8" />
      <stop offset="30%" style="stop-color:#c0c0c0" />
      <stop offset="60%" style="stop-color:#a0a0a0" />
      <stop offset="100%" style="stop-color:#707070" />
    </linearGradient>

    <!-- Dark silver for depth -->
    <linearGradient id="darkSilver" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#505050" />
      <stop offset="50%" style="stop-color:#808080" />
      <stop offset="100%" style="stop-color:#b0b0b0" />
    </linearGradient>

    <!-- Spherical orb gradient - offset highlight for 3D ball look -->
    <radialGradient id="orbGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="20%" style="stop-color:#e0e0e0" />
      <stop offset="50%" style="stop-color:#a0a0a0" />
      <stop offset="80%" style="stop-color:#606060" />
      <stop offset="100%" style="stop-color:#404040" />
    </radialGradient>

    <!-- Center hub gradient -->
    <radialGradient id="hubGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#f0f0f0" />
      <stop offset="30%" style="stop-color:#c0c0c0" />
      <stop offset="70%" style="stop-color:#808080" />
      <stop offset="100%" style="stop-color:#505050" />
    </radialGradient>

    <!-- Mechanical adaptation rotation - clicks like a ship wheel -->
    <style>
      @keyframes mahoragaAdaptation {
        0% { transform: rotate(0deg); }
        10% { transform: rotate(0deg); }
        12.5% { transform: rotate(45deg); }
        22.5% { transform: rotate(45deg); }
        25% { transform: rotate(90deg); }
        35% { transform: rotate(90deg); }
        37.5% { transform: rotate(135deg); }
        47.5% { transform: rotate(135deg); }
        50% { transform: rotate(180deg); }
        60% { transform: rotate(180deg); }
        62.5% { transform: rotate(225deg); }
        72.5% { transform: rotate(225deg); }
        75% { transform: rotate(270deg); }
        85% { transform: rotate(270deg); }
        87.5% { transform: rotate(315deg); }
        97.5% { transform: rotate(315deg); }
        100% { transform: rotate(360deg); }
      }
      .wheel-spin {
        transform-origin: 100px 100px;
        animation: mahoragaAdaptation 16s steps(8, end) infinite;
      }
    </style>
  </defs>

  <!-- Rotating wheel group -->
  <g class="wheel-spin">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="85"
            stroke="url(#silverGrad)"
            stroke-width="6"
            fill="none"
            opacity="0.8"/>

    <!-- Inner ring -->
    <circle cx="100" cy="100" r="80"
            stroke="url(#darkSilver)"
            stroke-width="2"
            fill="none"
            opacity="0.5"/>

    <!-- 8 curved spokes (quadratic bezier curves) -->
    <g stroke="url(#silverGrad)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9">
      <!-- Top spoke - curves right -->
      <path d="M100,72 Q115,50 100,20"/>
      <!-- Bottom spoke - curves right -->
      <path d="M100,128 Q85,150 100,180"/>
      <!-- Left spoke - curves down -->
      <path d="M72,100 Q50,85 20,100"/>
      <!-- Right spoke - curves down -->
      <path d="M128,100 Q150,115 180,100"/>
      <!-- Top-right diagonal -->
      <path d="M118,82 Q140,68 157,43"/>
      <!-- Bottom-left diagonal -->
      <path d="M82,118 Q60,132 43,157"/>
      <!-- Top-left diagonal -->
      <path d="M82,82 Q68,60 43,43"/>
      <!-- Bottom-right diagonal -->
      <path d="M118,118 Q132,140 157,157"/>
    </g>

    <!-- Spoke highlight lines for metallic sheen -->
    <g stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3">
      <path d="M100,70 Q113,50 100,22"/>
      <path d="M70,100 Q50,87 22,100"/>
      <path d="M84,84 Q70,62 45,45"/>
      <path d="M116,84 Q138,70 155,45"/>
    </g>

    <!-- 8 spherical orbs -->
    <g>
      <!-- Top -->
      <circle cx="100" cy="15" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Bottom -->
      <circle cx="100" cy="185" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Left -->
      <circle cx="15" cy="100" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Right -->
      <circle cx="185" cy="100" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Top-right -->
      <circle cx="160" cy="40" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Bottom-left -->
      <circle cx="40" cy="160" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Top-left -->
      <circle cx="40" cy="40" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
      <!-- Bottom-right -->
      <circle cx="160" cy="160" r="14" fill="url(#orbGrad)" stroke="#909090" stroke-width="1.5"/>
    </g>

    <!-- Orb specular highlights (small bright dot upper-left of each) -->
    <g fill="#ffffff" opacity="0.7">
      <circle cx="95" cy="10" r="3"/>
      <circle cx="95" cy="180" r="3"/>
      <circle cx="10" cy="95" r="3"/>
      <circle cx="180" cy="95" r="3"/>
      <circle cx="155" cy="35" r="3"/>
      <circle cx="35" cy="155" r="3"/>
      <circle cx="35" cy="35" r="3"/>
      <circle cx="155" cy="155" r="3"/>
    </g>
  </g>

  <!-- Central hub (non-rotating) -->
  <circle cx="100" cy="100" r="24"
          fill="url(#hubGrad)"
          stroke="url(#silverGrad)"
          stroke-width="3"/>

  <!-- Inner hub ring -->
  <circle cx="100" cy="100" r="17"
          stroke="url(#darkSilver)"
          stroke-width="2"
          fill="none"
          opacity="0.6"/>

  <!-- Central core -->
  <circle cx="100" cy="100" r="10"
          fill="url(#hubGrad)"/>

  <!-- Hub center cross -->
  <g stroke="#e0e0e0" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <line x1="100" y1="90" x2="100" y2="110"/>
    <line x1="90" y1="100" x2="110" y2="100"/>
  </g>

  <!-- Hub specular highlight -->
  <circle cx="94" cy="94" r="5" fill="#ffffff" opacity="0.4"/>
</svg>
