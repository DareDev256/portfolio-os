<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="skillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#aa00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="skillGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      .node { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#skillGlow)">
    <!-- Central node -->
    <circle cx="50" cy="50" r="12" stroke="url(#skillGrad)" stroke-width="2" fill="rgba(0, 240, 255, 0.2)"/>
    <circle cx="50" cy="50" r="5" fill="url(#skillGrad)"/>

    <!-- Outer nodes -->
    <circle cx="50" cy="15" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 0s"/>
    <circle cx="85" cy="35" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 0.3s"/>
    <circle cx="85" cy="70" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 0.6s"/>
    <circle cx="50" cy="88" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 0.9s"/>
    <circle cx="15" cy="70" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 1.2s"/>
    <circle cx="15" cy="35" r="7" stroke="url(#skillGrad)" stroke-width="1.5" fill="none" class="node" style="animation-delay: 1.5s"/>

    <!-- Connecting lines (web/mesh) -->
    <line x1="50" y1="38" x2="50" y2="22" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="44" x2="78" y2="35" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="56" x2="78" y2="70" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="50" y1="62" x2="50" y2="81" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="56" x2="22" y2="70" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="40" y1="44" x2="22" y2="35" stroke="url(#skillGrad)" stroke-width="1.5" opacity="0.7"/>

    <!-- Cross connections -->
    <line x1="50" y1="22" x2="78" y2="35" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="78" y1="35" x2="78" y2="70" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="78" y1="70" x2="50" y2="81" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="81" x2="22" y2="70" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="70" x2="22" y2="35" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="22" y1="35" x2="50" y2="22" stroke="url(#skillGrad)" stroke-width="1" opacity="0.4"/>

    <!-- Node dots -->
    <circle cx="50" cy="15" r="3" fill="url(#skillGrad)"/>
    <circle cx="85" cy="35" r="3" fill="url(#skillGrad)"/>
    <circle cx="85" cy="70" r="3" fill="url(#skillGrad)"/>
    <circle cx="50" cy="88" r="3" fill="url(#skillGrad)"/>
    <circle cx="15" cy="70" r="3" fill="url(#skillGrad)"/>
    <circle cx="15" cy="35" r="3" fill="url(#skillGrad)"/>
  </g>
</svg>
