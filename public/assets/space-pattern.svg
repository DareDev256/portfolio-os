<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#be185d" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6b21a8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0412" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Dark space background -->
  <rect width="200" height="200" fill="#0a0412"/>

  <!-- Nebula glow -->
  <circle cx="60" cy="80" r="80" fill="url(#nebula)"/>
  <circle cx="150" cy="40" r="50" fill="#be185d" opacity="0.15"/>
  <circle cx="30" cy="160" r="60" fill="#6b21a8" opacity="0.2"/>

  <!-- Stars - various sizes -->
  <!-- Large bright stars -->
  <circle cx="45" cy="30" r="2" fill="#fff"/>
  <circle cx="160" cy="85" r="2.5" fill="#fff"/>
  <circle cx="95" cy="170" r="2" fill="#fff"/>
  <circle cx="25" cy="120" r="1.8" fill="#fff"/>

  <!-- Medium stars -->
  <circle cx="80" cy="45" r="1.2" fill="#ec4899"/>
  <circle cx="130" cy="130" r="1.3" fill="#fff"/>
  <circle cx="175" cy="160" r="1.2" fill="#a855f7"/>
  <circle cx="15" cy="60" r="1.1" fill="#fff"/>
  <circle cx="110" cy="90" r="1.4" fill="#fff"/>

  <!-- Small stars -->
  <circle cx="55" cy="95" r="0.8" fill="#fff" opacity="0.9"/>
  <circle cx="140" cy="55" r="0.7" fill="#fff" opacity="0.8"/>
  <circle cx="185" cy="25" r="0.6" fill="#fff" opacity="0.7"/>
  <circle cx="70" cy="145" r="0.8" fill="#fff" opacity="0.85"/>
  <circle cx="120" cy="15" r="0.7" fill="#fff" opacity="0.9"/>
  <circle cx="35" cy="185" r="0.6" fill="#fff" opacity="0.75"/>
  <circle cx="165" cy="115" r="0.7" fill="#fff" opacity="0.8"/>
  <circle cx="90" cy="65" r="0.5" fill="#fff" opacity="0.7"/>
  <circle cx="10" cy="10" r="0.6" fill="#fff" opacity="0.8"/>
  <circle cx="190" cy="190" r="0.7" fill="#fff" opacity="0.85"/>

  <!-- Tiny dust particles -->
  <circle cx="50" cy="50" r="0.3" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="100" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="150" cy="150" r="0.3" fill="#fff" opacity="0.5"/>
  <circle cx="75" cy="175" r="0.4" fill="#fff" opacity="0.55"/>
  <circle cx="125" cy="75" r="0.3" fill="#fff" opacity="0.5"/>
  <circle cx="175" cy="75" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="25" cy="175" r="0.3" fill="#fff" opacity="0.5"/>
  <circle cx="75" cy="25" r="0.35" fill="#fff" opacity="0.55"/>
</svg>
