<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="trophyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d76e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trophyCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="trophyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes trophySpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes trophyPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .trophy-orbit { animation: trophySpin 10s linear infinite; transform-origin: 50px 50px; }
      .trophy-pulse { animation: trophyPulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#trophyGlow)">
    <!-- Orbit ring -->
    <circle cx="50" cy="50" r="44" stroke="url(#trophyCyan)" stroke-width="1.2" fill="none"
            stroke-dasharray="6 5" class="trophy-orbit" opacity="0.5"/>

    <!-- Trophy cup -->
    <path d="M35,30 L65,30 L62,55 C62,55 58,62 50,62 C42,62 38,55 38,55 Z"
          fill="url(#trophyGold)" opacity="0.9"/>

    <!-- Left handle -->
    <path d="M35,32 C25,32 22,42 28,48 C30,50 35,48 35,48"
          stroke="url(#trophyGold)" stroke-width="2.5" fill="none" opacity="0.8"/>

    <!-- Right handle -->
    <path d="M65,32 C75,32 78,42 72,48 C70,50 65,48 65,48"
          stroke="url(#trophyGold)" stroke-width="2.5" fill="none" opacity="0.8"/>

    <!-- Stem -->
    <rect x="47" y="62" width="6" height="8" fill="url(#trophyGold)" rx="1" opacity="0.85"/>

    <!-- Base -->
    <rect x="38" y="70" width="24" height="5" fill="url(#trophyGold)" rx="2" opacity="0.85"/>
    <rect x="42" y="75" width="16" height="3" fill="url(#trophyGold)" rx="1" opacity="0.7"/>

    <!-- Star on trophy -->
    <polygon points="50,36 52,42 58,42 53,46 55,52 50,48 45,52 47,46 42,42 48,42"
             fill="white" opacity="0.9"/>

    <!-- Sparkles -->
    <g class="trophy-pulse" opacity="0.6">
      <circle cx="25" cy="22" r="2" fill="#f5d76e"/>
      <circle cx="75" cy="22" r="2" fill="#00f0ff"/>
      <circle cx="20" cy="60" r="1.5" fill="#aa00ff"/>
      <circle cx="80" cy="60" r="1.5" fill="#f5d76e"/>
      <circle cx="50" cy="16" r="2" fill="#ffaa00"/>
    </g>

    <!-- Corner nodes -->
    <g opacity="0.35" class="trophy-pulse">
      <rect x="12" y="12" width="4" height="4" fill="#ffaa00" rx="1"/>
      <rect x="84" y="12" width="4" height="4" fill="#00f0ff" rx="1"/>
      <rect x="12" y="84" width="4" height="4" fill="#00f0ff" rx="1"/>
      <rect x="84" y="84" width="4" height="4" fill="#ffaa00" rx="1"/>
    </g>
  </g>
</svg>
