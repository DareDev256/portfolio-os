<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="vidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff0066;stop-opacity:1" />
    </linearGradient>
    <filter id="vidGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#vidGlow)">
    <!-- Monitor frame -->
    <rect x="12" y="15" width="76" height="50" rx="4"
          stroke="url(#vidGrad)" stroke-width="2.5" fill="rgba(255, 68, 68, 0.05)"/>

    <!-- Screen bezel line -->
    <rect x="12" y="15" width="76" height="8" rx="4"
          fill="rgba(255, 68, 68, 0.15)" stroke="none"/>

    <!-- Window dots -->
    <circle cx="20" cy="19" r="2" fill="url(#vidGrad)" opacity="0.7"/>
    <circle cx="27" cy="19" r="2" fill="url(#vidGrad)" opacity="0.5"/>
    <circle cx="34" cy="19" r="2" fill="url(#vidGrad)" opacity="0.3"/>

    <!-- Play button circle -->
    <circle cx="50" cy="47" r="16"
            stroke="url(#vidGrad)" stroke-width="2" fill="rgba(255, 68, 68, 0.1)"/>

    <!-- Play triangle -->
    <polygon points="44,38 44,56 60,47"
             fill="url(#vidGrad)" opacity="0.9"/>

    <!-- Monitor stand -->
    <line x1="50" y1="65" x2="50" y2="75"
          stroke="url(#vidGrad)" stroke-width="2.5"/>
    <line x1="35" y1="75" x2="65" y2="75"
          stroke="url(#vidGrad)" stroke-width="2.5"/>

    <!-- Signal waves -->
    <path d="M72 28 Q78 28 78 34" stroke="url(#vidGrad)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M72 25 Q82 25 82 37" stroke="url(#vidGrad)" stroke-width="1.5" fill="none" opacity="0.3"/>

    <!-- Film reel accent -->
    <circle cx="20" cy="80" r="6" stroke="url(#vidGrad)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="20" cy="80" r="2" fill="url(#vidGrad)" opacity="0.4"/>
    <line x1="26" y1="80" x2="74" y2="80"
          stroke="url(#vidGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
    <circle cx="80" cy="80" r="6" stroke="url(#vidGrad)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <circle cx="80" cy="80" r="2" fill="url(#vidGrad)" opacity="0.4"/>
  </g>
</svg>
