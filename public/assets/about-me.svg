<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aa00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc44ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
    </linearGradient>
    <filter id="aboutGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes aboutPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      .about-pulse { animation: aboutPulse 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#aboutGlow)">
    <!-- Diamond/gem shape — identity crystal -->
    <polygon points="50,8 85,50 50,92 15,50"
             stroke="url(#aboutGrad)" stroke-width="2.5" fill="rgba(170, 0, 255, 0.1)"
             stroke-linejoin="round"/>

    <!-- Inner diamond facets -->
    <line x1="50" y1="8" x2="50" y2="92" stroke="url(#aboutGrad)" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="50" x2="85" y2="50" stroke="url(#aboutGrad)" stroke-width="1" opacity="0.4"/>

    <!-- User silhouette in center -->
    <circle cx="50" cy="40" r="10" stroke="url(#aboutGrad)" stroke-width="2" fill="none"/>
    <path d="M 33 68 Q 33 55 50 55 Q 67 55 67 68" stroke="url(#aboutGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Corner data nodes -->
    <g fill="url(#aboutGrad)" class="about-pulse">
      <circle cx="50" cy="8" r="3"/>
      <circle cx="85" cy="50" r="3"/>
      <circle cx="50" cy="92" r="3"/>
      <circle cx="15" cy="50" r="3"/>
    </g>

    <!-- Status dot -->
    <circle cx="78" cy="22" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
