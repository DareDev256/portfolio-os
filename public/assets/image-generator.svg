<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="imgGenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be185d"/>
      <stop offset="50%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Main frame -->
  <rect x="8" y="12" width="48" height="40" rx="4"
        stroke="url(#imgGenGrad)" stroke-width="2.5" fill="none"/>

  <!-- Image placeholder mountains -->
  <path d="M12 44 L24 28 L32 36 L44 20 L52 32 L52 48 L12 48 Z"
        fill="url(#imgGenGrad)" opacity="0.3"/>

  <!-- Sun/light source -->
  <circle cx="44" cy="22" r="6" fill="url(#sparkGrad)" opacity="0.8"/>

  <!-- AI sparkle/magic effect - top right -->
  <g stroke="url(#sparkGrad)" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="8" x2="50" y2="2"/>
    <line x1="46" y1="6" x2="42" y2="2"/>
    <line x1="54" y1="6" x2="58" y2="2"/>
  </g>

  <!-- Wand/generation indicator -->
  <line x1="18" y1="56" x2="46" y2="56" stroke="url(#imgGenGrad)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="18" cy="56" r="3" fill="url(#sparkGrad)"/>

  <!-- Pixel dots for "generation" effect -->
  <circle cx="26" cy="56" r="1.5" fill="#be185d" opacity="0.8"/>
  <circle cx="32" cy="56" r="1.5" fill="#6b21a8" opacity="0.8"/>
  <circle cx="38" cy="56" r="1.5" fill="#4c1d95" opacity="0.8"/>
</svg>
