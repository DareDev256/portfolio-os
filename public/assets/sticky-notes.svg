<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="notesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="notesGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#notesGlow)">
    <!-- Back note (offset) -->
    <rect x="30" y="12" width="52" height="52" rx="4"
          stroke="url(#notesGrad)" stroke-width="1.5" fill="rgba(255, 170, 0, 0.06)" opacity="0.5"/>

    <!-- Middle note (offset) -->
    <rect x="22" y="20" width="52" height="52" rx="4"
          stroke="url(#notesGrad)" stroke-width="1.5" fill="rgba(255, 170, 0, 0.08)" opacity="0.7"/>

    <!-- Front note -->
    <rect x="14" y="28" width="52" height="52" rx="4"
          stroke="url(#notesGrad)" stroke-width="2" fill="rgba(255, 170, 0, 0.1)"/>

    <!-- Fold corner on front note -->
    <path d="M52 28 L66 28 L52 42 Z"
          stroke="url(#notesGrad)" stroke-width="1" fill="rgba(255, 170, 0, 0.15)"/>

    <!-- Text lines on front note -->
    <line x1="22" y1="46" x2="54" y2="46" stroke="url(#notesGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="22" y1="54" x2="48" y2="54" stroke="url(#notesGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="22" y1="62" x2="42" y2="62" stroke="url(#notesGrad)" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="70" x2="36" y2="70" stroke="url(#notesGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Pencil -->
    <line x1="68" y1="62" x2="82" y2="76" stroke="url(#notesGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="82,76 86,80 80,82" fill="url(#notesGrad)" opacity="0.8"/>
    <circle cx="68" cy="62" r="2.5" fill="url(#notesGrad)" opacity="0.6"/>
  </g>
</svg>
