<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="wxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="wxGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#wxGlow)">
    <!-- Sun -->
    <circle cx="62" cy="32" r="14" stroke="url(#wxGrad)" stroke-width="2" fill="rgba(0, 240, 255, 0.08)"/>
    <!-- Sun rays -->
    <line x1="62" y1="12" x2="62" y2="8" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="52" x2="62" y2="56" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="32" x2="38" y2="32" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="82" y1="32" x2="86" y2="32" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round"/>

    <!-- Cloud -->
    <path d="M22 58 C22 50, 30 44, 38 46 C40 38, 52 36, 56 44 C62 40, 72 44, 72 52 C78 52, 82 56, 80 62 C80 68, 74 72, 68 70 L30 70 C24 72, 18 66, 22 58Z"
          stroke="url(#wxGrad)" stroke-width="2" fill="rgba(170, 0, 255, 0.06)"/>

    <!-- Rain drops -->
    <line x1="36" y1="76" x2="34" y2="84" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="50" y1="76" x2="48" y2="86" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="64" y1="76" x2="62" y2="82" stroke="url(#wxGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
