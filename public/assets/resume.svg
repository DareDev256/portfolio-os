<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="resumeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <filter id="resumeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#resumeGlow)">
    <!-- Document base -->
    <path d="M20 10 L20 90 L80 90 L80 25 L65 10 Z"
          stroke="url(#resumeGrad)" stroke-width="2" fill="rgba(255, 170, 0, 0.08)"/>

    <!-- Folded corner -->
    <path d="M65 10 L65 25 L80 25"
          stroke="url(#resumeGrad)" stroke-width="2" fill="rgba(255, 170, 0, 0.15)"/>

    <!-- Profile circle -->
    <circle cx="35" cy="32" r="10" stroke="url(#resumeGrad)" stroke-width="1.5" fill="none"/>
    <circle cx="35" cy="30" r="4" fill="url(#resumeGrad)" opacity="0.8"/>
    <path d="M27 40 Q35 35 43 40" stroke="url(#resumeGrad)" stroke-width="1.5" fill="none"/>

    <!-- Name line -->
    <line x1="50" y1="28" x2="72" y2="28" stroke="url(#resumeGrad)" stroke-width="2"/>
    <!-- Title line -->
    <line x1="50" y1="36" x2="68" y2="36" stroke="url(#resumeGrad)" stroke-width="1.5" opacity="0.7"/>

    <!-- Section divider -->
    <line x1="28" y1="50" x2="72" y2="50" stroke="url(#resumeGrad)" stroke-width="1" opacity="0.5"/>

    <!-- Content lines -->
    <line x1="28" y1="58" x2="72" y2="58" stroke="url(#resumeGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="28" y1="66" x2="65" y2="66" stroke="url(#resumeGrad)" stroke-width="1.5" opacity="0.5"/>
    <line x1="28" y1="74" x2="70" y2="74" stroke="url(#resumeGrad)" stroke-width="1.5" opacity="0.4"/>
    <line x1="28" y1="82" x2="55" y2="82" stroke="url(#resumeGrad)" stroke-width="1.5" opacity="0.3"/>

    <!-- Skill dots -->
    <circle cx="74" cy="58" r="2" fill="url(#resumeGrad)"/>
    <circle cx="74" cy="66" r="2" fill="url(#resumeGrad)" opacity="0.8"/>
    <circle cx="74" cy="74" r="2" fill="url(#resumeGrad)" opacity="0.6"/>
  </g>
</svg>
