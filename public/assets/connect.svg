<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="connectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0066;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="connectGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes connectPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .connect-pulse { animation: connectPulse 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#connectGlow)">
    <!-- Outer circle — signal ring -->
    <circle cx="50" cy="50" r="40" stroke="url(#connectGrad)" stroke-width="2" fill="none" stroke-dasharray="6 3" class="connect-pulse"/>

    <!-- Signal waves emanating from center -->
    <path d="M 35 35 Q 25 50 35 65" stroke="url(#connectGrad)" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M 65 35 Q 75 50 65 65" stroke="url(#connectGrad)" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- Envelope / message icon -->
    <rect x="30" y="38" width="40" height="28" rx="3" stroke="url(#connectGrad)" stroke-width="2" fill="rgba(255, 0, 102, 0.1)"/>
    <polyline points="30,38 50,55 70,38" stroke="url(#connectGrad)" stroke-width="2" fill="none" stroke-linejoin="round"/>

    <!-- Connection nodes -->
    <g fill="url(#connectGrad)" class="connect-pulse">
      <circle cx="50" cy="10" r="3"/>
      <circle cx="90" cy="50" r="3"/>
      <circle cx="50" cy="90" r="3"/>
      <circle cx="10" cy="50" r="3"/>
    </g>

    <!-- Connecting lines to nodes -->
    <line x1="50" y1="10" x2="50" y2="38" stroke="url(#connectGrad)" stroke-width="1" opacity="0.3"/>
    <line x1="70" y1="52" x2="90" y2="50" stroke="url(#connectGrad)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
