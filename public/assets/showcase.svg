<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="showGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="showGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes showPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .show-pulse { animation: showPulse 1.8s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#showGlow)">
    <!-- Film frame / screen -->
    <rect x="15" y="20" width="70" height="50" rx="4" stroke="url(#showGrad)" stroke-width="2.5" fill="rgba(255, 0, 0, 0.08)"/>

    <!-- Film sprocket holes top -->
    <g fill="url(#showGrad)" opacity="0.5">
      <rect x="20" y="22" width="6" height="4" rx="1"/>
      <rect x="30" y="22" width="6" height="4" rx="1"/>
      <rect x="40" y="22" width="6" height="4" rx="1"/>
      <rect x="50" y="22" width="6" height="4" rx="1"/>
      <rect x="60" y="22" width="6" height="4" rx="1"/>
      <rect x="70" y="22" width="6" height="4" rx="1"/>
    </g>

    <!-- Film sprocket holes bottom -->
    <g fill="url(#showGrad)" opacity="0.5">
      <rect x="20" y="64" width="6" height="4" rx="1"/>
      <rect x="30" y="64" width="6" height="4" rx="1"/>
      <rect x="40" y="64" width="6" height="4" rx="1"/>
      <rect x="50" y="64" width="6" height="4" rx="1"/>
      <rect x="60" y="64" width="6" height="4" rx="1"/>
      <rect x="70" y="64" width="6" height="4" rx="1"/>
    </g>

    <!-- Play triangle -->
    <polygon points="42,33 42,57 62,45" stroke="url(#showGrad)" stroke-width="2" fill="rgba(255, 68, 68, 0.2)" stroke-linejoin="round" class="show-pulse"/>

    <!-- Film reel circles -->
    <circle cx="25" cy="82" r="8" stroke="url(#showGrad)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="25" cy="82" r="3" fill="url(#showGrad)" opacity="0.3"/>
    <circle cx="75" cy="82" r="8" stroke="url(#showGrad)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="75" cy="82" r="3" fill="url(#showGrad)" opacity="0.3"/>

    <!-- Connecting film strip -->
    <line x1="33" y1="82" x2="67" y2="82" stroke="url(#showGrad)" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
