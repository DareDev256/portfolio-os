<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="calcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="calcGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#calcGlow)">
    <!-- Body -->
    <rect x="18" y="10" width="64" height="80" rx="8"
          stroke="url(#calcGrad)" stroke-width="2.5" fill="rgba(0, 240, 255, 0.05)"/>

    <!-- Screen -->
    <rect x="26" y="18" width="48" height="18" rx="3"
          stroke="url(#calcGrad)" stroke-width="1.5" fill="rgba(0, 240, 255, 0.1)"/>

    <!-- Readout text -->
    <text x="68" y="32" font-family="monospace" font-size="12" font-weight="700"
          fill="url(#calcGrad)" text-anchor="end">3.14</text>

    <!-- Button grid (4x4) -->
    <rect x="26" y="44" width="9" height="9" rx="2" fill="rgba(0, 255, 136, 0.2)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="39" y="44" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="52" y="44" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="65" y="44" width="9" height="9" rx="2" fill="rgba(255, 0, 170, 0.15)" stroke="url(#calcGrad)" stroke-width="0.8"/>

    <rect x="26" y="57" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="39" y="57" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="52" y="57" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="65" y="57" width="9" height="9" rx="2" fill="rgba(255, 0, 170, 0.15)" stroke="url(#calcGrad)" stroke-width="0.8"/>

    <rect x="26" y="70" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="39" y="70" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="52" y="70" width="9" height="9" rx="2" fill="rgba(0, 240, 255, 0.08)" stroke="url(#calcGrad)" stroke-width="0.8"/>
    <rect x="65" y="70" width="9" height="9" rx="2" fill="rgba(255, 0, 170, 0.25)" stroke="url(#calcGrad)" stroke-width="0.8"/>
  </g>
</svg>
