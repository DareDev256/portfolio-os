<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00aa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#aa00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
    </linearGradient>
    <filter id="appGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes spark { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .spark { animation: spark 0.8s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#appGlow)">
    <!-- Lightning bolt -->
    <polygon points="55,10 35,45 48,45 42,90 65,50 52,50"
             stroke="url(#appGrad)" stroke-width="2.5" fill="rgba(255, 0, 170, 0.15)"
             stroke-linejoin="round"/>

    <!-- Energy sparks -->
    <circle cx="25" cy="35" r="3" fill="url(#appGrad)" class="spark" style="animation-delay: 0s"/>
    <circle cx="75" cy="30" r="2.5" fill="url(#appGrad)" class="spark" style="animation-delay: 0.2s"/>
    <circle cx="80" cy="60" r="2" fill="url(#appGrad)" class="spark" style="animation-delay: 0.4s"/>
    <circle cx="20" cy="65" r="2.5" fill="url(#appGrad)" class="spark" style="animation-delay: 0.6s"/>

    <!-- Grid lines for tech feel -->
    <line x1="10" y1="50" x2="25" y2="50" stroke="url(#appGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="75" y1="50" x2="90" y2="50" stroke="url(#appGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="5" x2="50" y2="15" stroke="url(#appGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="85" x2="50" y2="95" stroke="url(#appGrad)" stroke-width="1" opacity="0.5"/>
  </g>
</svg>
