<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="linkedinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00a0dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="linkedinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes linkedinPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      .linkedin-pulse { animation: linkedinPulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <g filter="url(#linkedinGlow)">
    <!-- Hexagonal frame -->
    <polygon points="50,8 88,29 88,71 50,92 12,71 12,29"
             stroke="url(#linkedinGrad)" stroke-width="2" fill="none" class="linkedin-pulse"/>

    <!-- Briefcase body -->
    <rect x="28" y="42" width="44" height="30" rx="3" stroke="url(#linkedinGrad)" stroke-width="2" fill="rgba(0, 119, 181, 0.1)"/>

    <!-- Briefcase handle -->
    <path d="M 40 42 L 40 35 Q 40 30 45 30 L 55 30 Q 60 30 60 35 L 60 42" stroke="url(#linkedinGrad)" stroke-width="2" fill="none"/>

    <!-- Briefcase clasp line -->
    <line x1="28" y1="52" x2="72" y2="52" stroke="url(#linkedinGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Network connection dots -->
    <g fill="url(#linkedinGrad)" class="linkedin-pulse">
      <circle cx="50" cy="8" r="3"/>
      <circle cx="88" cy="29" r="3"/>
      <circle cx="88" cy="71" r="3"/>
      <circle cx="50" cy="92" r="3"/>
      <circle cx="12" cy="71" r="3"/>
      <circle cx="12" cy="29" r="3"/>
    </g>

    <!-- Status indicator -->
    <circle cx="78" cy="20" r="4" fill="#00ff88">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
