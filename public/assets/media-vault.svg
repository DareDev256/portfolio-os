<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="mediaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
    <filter id="mediaGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#mediaGlow)">
    <!-- Folder back -->
    <path d="M15 30 L15 75 L85 75 L85 35 L50 35 L45 30 Z"
          stroke="url(#mediaGrad)" stroke-width="2" fill="none"/>

    <!-- Folder front -->
    <path d="M15 40 L15 75 L85 75 L85 40 Z"
          stroke="url(#mediaGrad)" stroke-width="2" fill="rgba(0, 240, 255, 0.1)"/>

    <!-- Play symbol inside -->
    <polygon points="40,50 40,65 55,57.5"
             fill="url(#mediaGrad)" opacity="0.8"/>

    <!-- Image icon -->
    <rect x="58" y="48" width="18" height="14" rx="2"
          stroke="url(#mediaGrad)" stroke-width="1.5" fill="none"/>
    <circle cx="63" cy="53" r="2" fill="url(#mediaGrad)"/>
    <polyline points="60,60 65,55 70,58 74,54"
              stroke="url(#mediaGrad)" stroke-width="1" fill="none"/>

    <!-- Lock indicator -->
    <rect x="70" y="25" width="12" height="10" rx="2"
          stroke="url(#mediaGrad)" stroke-width="1.5" fill="none"/>
    <path d="M72 25 L72 22 Q76 18 80 22 L80 25"
          stroke="url(#mediaGrad)" stroke-width="1.5" fill="none"/>
  </g>
</svg>
