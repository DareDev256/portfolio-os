<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:1" />
    </linearGradient>
    <filter id="termGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
  </defs>

  <g filter="url(#termGlow)">
    <!-- Terminal window frame -->
    <rect x="10" y="15" width="80" height="70" rx="5"
          stroke="url(#termGrad)" stroke-width="2" fill="rgba(0, 255, 136, 0.05)"/>

    <!-- Title bar -->
    <line x1="10" y1="28" x2="90" y2="28" stroke="url(#termGrad)" stroke-width="1" opacity="0.5"/>

    <!-- Window buttons -->
    <circle cx="20" cy="22" r="3" fill="#ff5f56"/>
    <circle cx="30" cy="22" r="3" fill="#ffbd2e"/>
    <circle cx="40" cy="22" r="3" fill="#27ca3f"/>

    <!-- Command prompt > -->
    <polyline points="18,42 28,50 18,58"
              stroke="url(#termGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Typed text lines -->
    <line x1="35" y1="50" x2="70" y2="50" stroke="url(#termGrad)" stroke-width="2" opacity="0.8"/>
    <line x1="35" y1="62" x2="55" y2="62" stroke="url(#termGrad)" stroke-width="2" opacity="0.6"/>

    <!-- Blinking cursor -->
    <rect x="58" y="58" width="8" height="12" fill="url(#termGrad)" class="cursor"/>

    <!-- Output indicator -->
    <line x1="18" y1="72" x2="45" y2="72" stroke="url(#termGrad)" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
