<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Pink pixel character body -->
  <rect x="8" y="6" width="16" height="20" fill="#ff00aa"/>

  <!-- Horizontal scan lines for pixel effect -->
  <rect x="8" y="8" width="16" height="2" fill="#ff44cc"/>
  <rect x="8" y="12" width="16" height="2" fill="#ff44cc"/>
  <rect x="8" y="16" width="16" height="2" fill="#ff44cc"/>
  <rect x="8" y="20" width="16" height="2" fill="#ff44cc"/>

  <!-- Eyes (white rectangles) -->
  <rect x="10" y="10" width="4" height="4" fill="#ffffff"/>
  <rect x="18" y="10" width="4" height="4" fill="#ffffff"/>

  <!-- Pupils -->
  <rect x="12" y="11" width="2" height="2" fill="#000000"/>
  <rect x="20" y="11" width="2" height="2" fill="#000000"/>

  <!-- Glow effect -->
  <rect x="8" y="6" width="16" height="20" fill="none" stroke="#ff00aa" stroke-width="1" opacity="0.5"/>
</svg>
