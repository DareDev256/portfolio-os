<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Back note -->
  <rect x="18" y="8" width="36" height="36" rx="3" fill="#00ff88" opacity="0.15" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Middle note -->
  <rect x="12" y="14" width="36" height="36" rx="3" fill="#00f0ff" opacity="0.15" stroke="#00f0ff" stroke-width="1.5"/>
  <!-- Front note -->
  <rect x="6" y="20" width="36" height="36" rx="3" fill="#ffaa00" opacity="0.15" stroke="#ffaa00" stroke-width="1.5"/>
  <!-- Lines on front note -->
  <line x1="12" y1="32" x2="34" y2="32" stroke="#ffaa00" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="38" x2="30" y2="38" stroke="#ffaa00" stroke-width="1" opacity="0.5"/>
  <line x1="12" y1="44" x2="26" y2="44" stroke="#ffaa00" stroke-width="1" opacity="0.5"/>
  <!-- Pencil -->
  <line x1="44" y1="48" x2="52" y2="56" stroke="#ff00aa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="44" cy="48" r="2" fill="#ff00aa" opacity="0.6"/>
</svg>
