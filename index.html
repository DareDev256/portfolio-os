<body data-theme="dark" class="galaxy-active galaxy-container">
    <a href="#desktop" class="skip-link">Skip to desktop</a>
    <!-- Scan lines overlay (global) -->
    <div class="scan-lines"></div>

    <!-- Lock/Boot Screen -->
    <div id="lockScreen" class="lock-screen" role="dialog" aria-label="Lock screen">
        <!-- Grid Background -->
        <div class="grid-background"></div>

        <!-- Cinematic Intro Stage -->
        <div class="intro-stage" id="introStage">
            <!-- Scanline sweep (Act 1) -->
            <div class="intro-scanline" data-act="1"></div>

            <!-- Watermark wheel (behind text) with orbit rings -->
            <div class="intro-watermark" data-act="2">
                <img src="assets/mahoraga-wheel.svg" class="intro-watermark-img galaxy-wheel-animated" alt="">
                <div class="hud-orbit-ring hud-orbit-ring--dashed hud-orbit-ring--cw-slow" style="width: 120%; height: 120%;"></div>
                <div class="hud-orbit-ring hud-orbit-ring--dotted hud-orbit-ring--ccw-slow" style="width: 140%; height: 140%;"></div>
                <div class="hud-orbit-ring hud-orbit-ring--ticks hud-orbit-ring--cw-fast" style="width: 160%; height: 160%;"></div>
            </div>

            <!-- Title block -->
            <div class="intro-title-block">
                <div class="os-title galaxy-text" data-text="PASSION OS" data-act="2">PASSION OS</div>
                <div class="os-subtitle" data-act="2">
                    <span class="subtitle-text"></span><span class="subtitle-cursor">_</span>
                </div>
            </div>

            <!-- Identity block -->
            <div id="loginContent" class="intro-identity" data-act="3">
                <div class="login-username">DAREDEV256</div>
                <div class="login-role">AI SOLUTIONS ENGINEER • CREATIVE TECHNOLOGIST</div>

                <button id="loginButton" class="cyber-button">
                    <svg class="btn-border-svg" viewBox="0 0 200 50" preserveAspectRatio="none">
                        <rect class="btn-border-rect" x="0.5" y="0.5" width="199" height="49" rx="0" ry="0" />
                    </svg>
                    <span class="btn-label">INITIALIZE</span>
                </button>
            </div>

            <!-- Boot Sequence Container (Hidden by default) -->
            <div id="bootSequence" class="boot-sequence hidden">
                <!-- Boot lines will be injected here -->
            </div>
        </div>
    </div>

    <!-- Login Screen (Integrated into LockScreen for this design, keeping ID for compatibility if needed) -->
    <div id="loginScreen" class="login-screen hidden">
        <!-- Kept for compatibility but functionality moved to lockScreen/boot sequence -->
    </div>

    <!-- Background Wheel -->
    <div class="bg-wheel-container">
        <img src="assets/mahoraga-wheel.svg" class="bg-wheel galaxy-wheel" alt="System Wheel">
    </div>

    <!-- Desktop -->
    <div id="desktop" class="desktop hidden">
        <div id="screenReaderAnnouncer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
        <!-- Top Status Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <img src="assets/mahoraga-wheel.svg" class="logo-wheel" alt="Passion OS Logo">
                <span class="brand">PASSION OS</span>
                <span class="version">v3.10.0 • DAREDEV256</span>
            </div>
            <div class="top-bar-right">
                <div class="hud-mini-bars" aria-hidden="true">
                    <div class="hud-mini-bar"></div>
                    <div class="hud-mini-bar"></div>
                    <div class="hud-mini-bar"></div>
                    <div class="hud-mini-bar"></div>
                    <div class="hud-mini-bar"></div>
                </div>
                <span class="status-item">▲ 98% CPU</span>
                <span class="status-item text-green">◉ ONLINE</span>
                <span class="status-item time-display">12:00:00</span>
                <button class="control-panel-icon" id="controlPanelBtn" title="Quick Settings (Cmd+P / Alt+P)">
                    ⚙
                </button>
            </div>
        </div>

        <!-- Desktop Icons Container -->
        <div class="desktop-icons" role="navigation" aria-label="Desktop icons">
            <!-- Icons generated by JS -->
        </div>

        <!-- Windows Container -->
        <div id="windowsContainer" class="windows-container" role="region" aria-label="Application windows" aria-live="polite">
            <!-- Windows created dynamically -->
        </div>

        <!-- Dock (formerly Taskbar) -->
        <div class="taskbar dock-style energy-glow hud-brackets" role="navigation" aria-label="Dock">
            <div class="hud-bracket-tr"></div>
            <div class="hud-bracket-bl"></div>
            <div class="dock-section dock-launchers-section">
                <div class="dock-section-label">APPS</div>
                <div id="dockLaunchers" class="dock-launchers"></div>
            </div>
            <div class="dock-separator"></div>
            <div class="dock-section dock-windows-section">
                <div class="dock-section-label">OPEN</div>
                <div class="taskbar-windows" id="taskbarWindows">
                    <!-- Window buttons -->
                </div>
            </div>
        </div>

        <!-- Start Menu (Hidden/Repurposed) -->
        <div id="startMenu" class="start-menu hidden">
            <!-- Existing start menu structure -->
        </div>

        <!-- Context Menu -->
        <div id="contextMenu" class="context-menu hidden" role="menu"></div>

        <!-- Lightbox -->
        <div id="lightbox" class="lightbox hidden" role="dialog" aria-label="Image lightbox">
            <div class="lightbox-overlay"></div>
            <div class="lightbox-content">
                <button class="lightbox-close" aria-label="Close lightbox">×</button>
                <button class="lightbox-prev" aria-label="Previous image">‹</button>
                <button class="lightbox-next" aria-label="Next image">›</button>
                <div class="lightbox-media"></div>
                <div class="lightbox-caption"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Security: DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"
