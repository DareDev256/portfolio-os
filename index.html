<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive portfolio with a Cyberpunk OS interface" />
    <link rel="icon" type="image/svg+xml" href="/assets/mahoraga-wheel.svg">
    <title>Passion OS v2.56</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/reset.css?v=2.56" />
    <link rel="stylesheet" href="/css/variables.css?v=2.56" />
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/windows.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/modal.css?v=2.56" />
    <link rel="stylesheet" href="/css/loading.css?v=2.56" />
    <link rel="stylesheet" href="/css/welcome.css?v=2.56" />
    <link rel="stylesheet" href="/css/tour.css?v=2.56" />
    <link rel="stylesheet" href="/css/interactions.css?v=2.56" />
    <link rel="stylesheet" href="/css/mobile.css?v=2.56" />
    <link rel="stylesheet" href="/css/accessibility.css?v=2.56" />
    <link rel="stylesheet" href="/css/galaxy.css?v=2.56" />
</head>

<body data-theme="dark">
    <!-- Scan lines overlay (global) -->
    <div class="scan-lines"></div>

    <!-- Lock/Boot Screen -->
    <div id="lockScreen" class="lock-screen" role="dialog" aria-label="Lock screen">
        <!-- Grid Background -->
        <div class="grid-background"></div>

        <div class="login-panel">
            <!-- Corner accents -->
            <div class="corner-accent tl"></div>
            <div class="corner-accent tr"></div>
            <div class="corner-accent bl"></div>
            <div class="corner-accent br"></div>

            <div class="os-title" data-text="PASSION OS">PASSION OS</div>
            <div class="os-subtitle">CREATIVE OPERATING SYSTEM v2.56</div>

            <div id="loginContent">
                <div class="login-avatar-container">
                    <div class="login-avatar-ring"></div>
                    <img src="assets/mahoraga-wheel.svg" class="login-avatar-icon logo-wheel"
                        style="width: 70px; height: 70px; margin: 0;">
                </div>

                <div class="login-username">DAREDEV256</div>
                <div class="login-role">DEVELOPER • CREATOR • VISIONARY</div>

                <button id="loginButton" class="cyber-button">INITIALIZE</button>
            </div>

            <!-- Boot Sequence Container (Hidden by default) -->
            <div id="bootSequence" class="boot-sequence hidden">
                <!-- Boot lines will be injected here -->
            </div>
        </div>
    </div>

    <!-- Login Screen (Integrated into LockScreen for this design, keeping ID for compatibility if needed) -->
    <div id="loginScreen" class="login-screen hidden">
        <!-- Kept for compatibility but functionality moved to lockScreen/boot sequence -->
    </div>

    <!-- Background Wheel -->
    <div class="bg-wheel-container">
        <img src="assets/mahoraga-wheel.svg" class="bg-wheel" alt="System Wheel">
    </div>

    <!-- Desktop -->
    <div id="desktop" class="desktop hidden">
        <!-- Top Status Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <img src="assets/mahoraga-wheel.svg" class="logo-wheel" alt="Passion OS Logo">
                <span class="brand">PASSION OS</span>
                <span class="version">v2.56 • DAREDEV256</span>
            </div>
            <div class="top-bar-right">
                <span class="status-item">▲ 98% CPU</span>
                <span class="status-item text-green">◉ ONLINE</span>
                <span class="status-item time-display">12:00:00</span>
                <button class="control-panel-icon" id="controlPanelBtn" title="Quick Settings (Cmd+P / Alt+P)">
                    ⚙
                </button>
            </div>
        </div>

        <!-- Desktop Icons Container -->
        <div class="desktop-icons" role="navigation" aria-label="Desktop icons">
            <!-- Icons generated by JS -->
        </div>

        <!-- Windows Container -->
        <div id="windowsContainer" class="windows-container" role="region" aria-label="Application windows">
            <!-- Windows created dynamically -->
        </div>

        <!-- Dock (formerly Taskbar) -->
        <div class="taskbar dock-style" role="navigation" aria-label="Dock">
            <div class="dock-section dock-launchers-section">
                <div class="dock-section-label">APPS</div>
                <div id="dockLaunchers" class="dock-launchers"></div>
            </div>
            <div class="dock-separator"></div>
            <div class="dock-section dock-windows-section">
                <div class="dock-section-label">OPEN</div>
                <div class="taskbar-windows" id="taskbarWindows">
                    <!-- Window buttons -->
                </div>
            </div>
        </div>

        <!-- Start Menu (Hidden/Repurposed) -->
        <div id="startMenu" class="start-menu hidden">
            <!-- Existing start menu structure -->
        </div>

        <!-- Context Menu -->
        <div id="contextMenu" class="context-menu hidden" role="menu"></div>

        <!-- Lightbox -->
        <div id="lightbox" class="lightbox hidden" role="dialog" aria-label="Image lightbox">
            <div class="lightbox-overlay"></div>
            <div class="lightbox-content">
                <button class="lightbox-close" aria-label="Close lightbox">×</button>
                <button class="lightbox-prev" aria-label="Previous image">‹</button>
                <button class="lightbox-next" aria-label="Next image">›</button>
                <div class="lightbox-media"></div>
                <div class="lightbox-caption"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Security: DOMPurify for XSS protection -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <!-- System Verified: DareDev256 -->
    <script type="module" src="/js/main.js"></script>
</body>

</html>
